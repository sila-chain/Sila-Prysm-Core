syntax = "proto3";

package ethereum.eth.v1alpha1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/wrappers.proto";

import "proto/eth/ext/options.proto";

import "proto/prysm/v1alpha1/beacon_block.proto";
import "proto/prysm/v1alpha1/beacon_core_types.proto";
import "proto/prysm/v1alpha1/sync_committee.proto";
import "proto/prysm/v1alpha1/attestation.proto";
import "proto/prysm/v1alpha1/gloas.proto";

option csharp_namespace = "Ethereum.Eth.V1";
option go_package = "github.com/OffchainLabs/prysm/v7/proto/prysm/v1alpha1;eth";
option java_multiple_files = true;
option java_outer_classname = "ValidatorProto";
option java_package = "org.ethereum.eth.v1alpha1";
option php_namespace = "Ethereum\\Eth\\v1alpha1";

// Beacon node validator API
//
// The beacon node validator API enables a validator to connect
// and perform its obligations on the Ethereum Beacon Chain.
service BeaconNodeValidator {
  // Retrieves validator duties for the requested validators.
  //
  // The duties consist of:
  //   Proposer - the validator that creates a beacon chain block.
  //   Attester — a validator that is part of a committee that needs to sign off
  //   on a beacon chain
  //    block while simultaneously creating a cross link to a recent shard block
  //    on a particular shard chain.
  // The server returns a list of duties which are the actions should be
  // performed by validators for a given epoch. Validator duties should be
  // polled every epoch, but due to chain reorg of >MIN_SEED_LOOKAHEAD could
  // occur, the validator duties could chain. For complete safety, it is
  // recommended to poll at every slot to ensure validator is fully aware of any
  // sudden chain reorg.
  rpc GetDuties(DutiesRequest) returns (DutiesResponse) {
    option deprecated = true;
    option (google.api.http) = {
      get : "/eth/v1alpha1/validator/duties"
    };
  }

  // GetDutiesV2 Retrieves validator duties for the requested validators.
  //
  // The duties consist of:
  //   Proposer - the validator that creates a beacon chain block.
  //   Attester — a validator that is part of a committee that needs to sign off
  //   on a beacon chain
  //   Sync Committee - a special group of validators that ensure lightclients
  //   and effectively sync with Ethereum and continues in this role for 256
  //   epochs if selected
  // The server returns a list of duties which are the actions should be
  // performed by validators for a given epoch. Validator duties should be
  // polled every epoch, but due to chain reorg of >MIN_SEED_LOOKAHEAD could
  // occur, the validator duties could chain. For complete safety, it is
  // recommended to poll at every slot to ensure validator is fully aware of any
  // sudden chain reorg.
  //
  // GetDutiesV2 differs from GetDuties through the removal of the full
  // committee list in favor of adding committee_length and
  // validator_committee_index fields which significantly saves on marshalling
  rpc GetDutiesV2(DutiesRequest) returns (DutiesV2Response) {
    option deprecated = true;
    option (google.api.http) = {
      get : "/eth/v1alpha1/validator/dutiesV2"
    };
  }

  // Deprecated: Use the REST API instead. GetAttesterDuties retrieves attester duties for the requested validators at the given epoch.
  rpc GetAttesterDuties(AttesterDutiesRequest) returns (AttesterDutiesResponse) {
    option deprecated = true;
    option (google.api.http) = {
      get : "/eth/v1alpha1/validator/duties/attester"
    };
  }

  // Deprecated: Use the REST API instead. GetProposerDutiesV2 retrieves proposer duties for the given epoch.
  rpc GetProposerDutiesV2(ProposerDutiesRequest) returns (ProposerDutiesResponse) {
    option deprecated = true;
    option (google.api.http) = {
      get : "/eth/v1alpha1/validator/duties/proposer"
    };
  }

  // Deprecated: Use the REST API instead. GetSyncCommitteeDuties retrieves sync committee duties for the requested validators at the given epoch.
  rpc GetSyncCommitteeDuties(SyncCommitteeDutiesRequest) returns (SyncCommitteeDutiesResponse) {
    option deprecated = true;
    option (google.api.http) = {
      get : "/eth/v1alpha1/validator/duties/sync_committee"
    };
  }

  // Deprecated: Use the REST API instead. GetPTCDuties retrieves payload timeliness committee duties for the requested validators at the given epoch.
  rpc GetPTCDuties(PTCDutiesRequest) returns (PTCDutiesResponse) {
    option deprecated = true;
    option (google.api.http) = {
      get : "/eth/v1alpha1/validator/duties/ptc"
    };
  }

  // DomainData fetches the current BLS signature domain version information
  // from the running beacon node's state. This information is used when
  // validators sign blocks and attestations appropriately based on their duty.
  rpc DomainData(DomainRequest) returns (DomainResponse) {
    option deprecated = true;
    option (google.api.http) = {
      get : "/eth/v1alpha1/validator/domain"
    };
  }

  // WaitForChainStart queries the logs of the Validator Deposit Contract on the
  // Ethereum proof-of-work chain to verify the beacon chain has started its
  // runtime and validators are ready to begin their responsibilities.
  //
  // If the chain has not yet started, this endpoint starts a server-side stream
  // which updates the client when the beacon chain is ready.
  rpc WaitForChainStart(google.protobuf.Empty)
      returns (stream ChainStartResponse) {
    option deprecated = true;
    option (google.api.http) = {
      get : "/eth/v1alpha1/validator/chainstart/stream"
    };
  }

  // WaitForActivation checks if a validator public key exists in the active
  // validator registry of the current beacon state. If the validator is NOT yet
  // active, it starts a server-side stream which updates the client whenever
  // the validator becomes active in the beacon node's state.
  //
  // The input to this endpoint is a list of validator public keys, and the
  // corresponding stream will respond until at least a single corresponding
  // validator to those keys is activated.
  rpc WaitForActivation(ValidatorActivationRequest)
      returns (stream ValidatorActivationResponse) {
    option deprecated = true;
    option (google.api.http) = {
      get : "/eth/v1alpha1/validator/activation/stream"
    };
  }

  // ValidatorIndex retrieves a validator's index location in the beacon state's
  // validator registry looking up whether the validator exists based on its
  // public key. This method returns NOT_FOUND if no index is found for the
  // public key specified in the request.
  rpc ValidatorIndex(ValidatorIndexRequest) returns (ValidatorIndexResponse) {
    option deprecated = true;
    option (google.api.http) = {
      get : "/eth/v1alpha1/validator/index"
    };
  }

  // ValidatorStatus returns a validator's status based on the current epoch.
  // The request can specify either a validator's public key or validator index.
  //
  // The status response can be one of the following:
  //	DEPOSITED - validator's deposit has been recognized by Ethereum 1, not
  // yet recognized by Ethereum. 	PENDING - validator is in Ethereum's
  // activation queue. 	ACTIVE - validator is active. 	EXITING - validator has
  // initiated an an exit request, or has dropped below the ejection balance and
  // is being kicked out. 	EXITED - validator is no longer validating.
  // SLASHING - validator has been kicked out due to meeting a slashing
  // condition. 	UNKNOWN_STATUS - validator does not have a known status
  // in the network.
  rpc ValidatorStatus(ValidatorStatusRequest)
      returns (ValidatorStatusResponse) {
    option deprecated = true;
    option (google.api.http) = {
      get : "/eth/v1alpha1/validator/status"
    };
  }

  // MultipleValidatorStatus returns a list of validator statuses on the current
  // epoch. The request can specify a list of validator public keys.
  //
  // Returns a list of ValidatorStatusResponses.
  rpc MultipleValidatorStatus(MultipleValidatorStatusRequest)
      returns (MultipleValidatorStatusResponse) {
    option deprecated = true;
    option (google.api.http) = {
      get : "/eth/v1alpha1/validator/statuses"
    };
  }

  // Retrieves the latest valid beacon block to be proposed on the beacon chain.
  //
  // The server returns a new beacon block, without proposer signature, that can
  // be proposed on the beacon chain. The block should be filled with all the
  // necessary data for proposer to sign.
  rpc GetBeaconBlock(BlockRequest) returns (GenericBeaconBlock) {
    option deprecated = true;
    option (google.api.http) = {
      get : "/eth/v1alpha2/validator/block"
    };
  }

  // Sends the newly signed beacon block to beacon node.
  //
  // The validator sends the newly signed beacon block to the beacon node so the
  // beacon block can be included in the beacon chain. The beacon node is
  // expected to validate and process the beacon block into its state.
  rpc ProposeBeaconBlock(GenericSignedBeaconBlock) returns (ProposeResponse) {
    option deprecated = true;
    option (google.api.http) = {
      post : "/eth/v1alpha2/validator/block"
      body : "*"
    };
  }

  // PrepareBeaconProposer submits fee recipient information to be used when
  // preparing block proposal execution payloads.
  rpc PrepareBeaconProposer(PrepareBeaconProposerRequest)
      returns (google.protobuf.Empty) {
    option deprecated = true;
    option (google.api.http) = {
      post : "/eth/v1alpha1/validator/prepare_beacon_proposer"
      body : "*"
    };
  }

  // GetFeeRecipientByPubKey returns a fee recipient from the beacon node's
  // settings or db based on a given public key
  rpc GetFeeRecipientByPubKey(FeeRecipientByPubKeyRequest)
      returns (FeeRecipientByPubKeyResponse) {
    option deprecated = true;
    option (google.api.http) = {
      post : "/eth/v1alpha1/validator/fee_recipient_by_pub_key"
      body : "*"
    };
  }

  // Retrieves the latest valid attestation data to be attested on the beacon
  // chain.
  //
  // The server returns the latest valid data which represents the correct vote
  // for the head of the beacon chain.
  rpc GetAttestationData(AttestationDataRequest) returns (AttestationData) {
    option deprecated = true;
    option (google.api.http) = {
      get : "/eth/v1alpha1/validator/attestation"
    };
  }

  // Sends the newly signed attestation to beacon node.
  //
  // The validator sends the newly signed attestation to the beacon node for the
  // attestation to be included in the beacon chain. The beacon node is expected
  // to validate and publish attestation on appropriate committee subnet.
  rpc ProposeAttestation(Attestation) returns (AttestResponse) {
    option deprecated = true;
    option (google.api.http) = {
      post : "/eth/v1alpha1/validator/attestation"
      body : "*"
    };
  }

  // Sends the newly signed attestation to beacon node.
  //
  // The validator sends the newly signed attestation to the beacon node for the
  // attestation to be included in the beacon chain. The beacon node is expected
  // to validate and publish attestation on appropriate committee subnet.
  rpc ProposeAttestationElectra(SingleAttestation) returns (AttestResponse) {
    option deprecated = true;
    option (google.api.http) = {
      post : "/eth/v1alpha1/validator/attestation_electra"
      body : "*"
    };
  }

  // Submit selection proof to the beacon node to aggregate all matching wire
  // attestations with the same data root. the beacon node responses with an
  // aggregate and proof object back to validator to sign over.
  rpc SubmitAggregateSelectionProof(AggregateSelectionRequest)
      returns (AggregateSelectionResponse) {
    option deprecated = true;
    option (google.api.http) = {
      post : "/eth/v1alpha1/validator/aggregate"
      body : "*"
    };
  }

  // Submit selection proof to the beacon node to aggregate all matching wire
  // attestations with the same data root. the beacon node responses with an
  // aggregate and proof object back to validator to sign over.
  rpc SubmitAggregateSelectionProofElectra(AggregateSelectionRequest)
      returns (AggregateSelectionElectraResponse) {
    option deprecated = true;
    option (google.api.http) = {
      post : "/eth/v1alpha1/validator/aggregate_electra"
      body : "*"
    };
  }

  // Submit a signed aggregate and proof object, the beacon node will broadcast
  // the signed aggregated attestation and proof object.
  rpc SubmitSignedAggregateSelectionProof(SignedAggregateSubmitRequest)
      returns (SignedAggregateSubmitResponse) {
    option deprecated = true;
    option (google.api.http) = {
      post : "/eth/v1alpha1/validator/aggregate"
      body : "*"
    };
  }

  // Submit a signed aggregate and proof object, the beacon node will broadcast
  // the signed aggregated attestation and proof object.
  rpc SubmitSignedAggregateSelectionProofElectra(
      SignedAggregateSubmitElectraRequest)
      returns (SignedAggregateSubmitResponse) {
    option deprecated = true;
    option (google.api.http) = {
      post : "/eth/v1alpha1/validator/aggregate_electra"
      body : "*"
    };
  }

  // Propose to leave the list of active validators.
  //
  // The beacon node is expected to validate the request and make it available
  // for inclusion in the next proposed block.
  rpc ProposeExit(SignedVoluntaryExit) returns (ProposeExitResponse) {
    option deprecated = true;
    option (google.api.http) = {
      post : "/eth/v1alpha1/validator/exit"
      body : "*"
    };
  }

  // Subscribe to particular committee ID subnets given validator's duty.
  //
  // The beacon node is expected to subscribe to the committee ID subnet given
  // by the request. With this, beacon node serving attesters can find
  // persistent peers on the subnet to publish attestation, and beacon node
  // serving aggregator can join the subnet.
  rpc SubscribeCommitteeSubnets(CommitteeSubnetsSubscribeRequest)
      returns (google.protobuf.Empty) {
    option deprecated = true;
    option (google.api.http) = {
      post : "/eth/v1alpha1/validator/subnet/subscribe"
      body : "*"
    };
  }

  // Checks the beacon node if another instance of the provided validator keys
  // have been attesting/proposing for you.
  rpc CheckDoppelGanger(DoppelGangerRequest) returns (DoppelGangerResponse) {
    option deprecated = true;
    option (google.api.http) = {
      get : "/eth/v1alpha1/validator/doppelganger"
    };
  }

  // Retrieves a sync committee message block root to be signed over as part of
  // sync committee duty.
  rpc GetSyncMessageBlockRoot(google.protobuf.Empty)
      returns (SyncMessageBlockRootResponse) {
    option deprecated = true;
    option (google.api.http) = {
      get : "/eth/v1alpha1/validator/sync_message_block_root"
    };
  }

  // Submits a sync committee message to be broadcasted over network. This is
  // part of sync committee duty.
  rpc SubmitSyncMessage(SyncCommitteeMessage) returns (google.protobuf.Empty) {
    option deprecated = true;
    option (google.api.http) = {
      post : "/eth/v1alpha1/validator/sync_message"
      body : "*"
    };
  }

  // Retrieves the sync subcommittee index of a given validator.
  //
  // The server returns the sync subcommittee index given the validator public
  // key, if the validator does not exist in the sync committee then an error
  // would be returned. The subcommittee index is used for the aggregation of
  // sync committee message.
  rpc GetSyncSubcommitteeIndex(SyncSubcommitteeIndexRequest)
      returns (SyncSubcommitteeIndexResponse) {
    option deprecated = true;
    option (google.api.http) = {
      get : "/eth/v1alpha1/sync_subcommittee_index"
    };
  }

  // Retrieve sync committee contribution to the beacon node to aggregate all
  // matching sync committee messages with the same slot and root. the beacon
  // node responses with a sync committee contribution object for the validator
  // to sign over.
  rpc GetSyncCommitteeContribution(SyncCommitteeContributionRequest)
      returns (SyncCommitteeContribution) {
    option deprecated = true;
    option (google.api.http) = {
      post : "/eth/v1alpha1/validator/contribution_and_proof"
      body : "*"
    };
  }

  // Submit a signed sync committee contribution and proof object, the beacon
  // node will broadcast the signed contribution and proof object.
  rpc SubmitSignedContributionAndProof(SignedContributionAndProof)
      returns (google.protobuf.Empty) {
    option deprecated = true;
    option (google.api.http) = {
      post : "/eth/v1alpha1/validator/signed_contribution_and_proof"
      body : "*"
    };
  }

  // Server-side stream of all slots of valid blocks as they are received by
  // the beacon chain node.
  // DEPRECATED: This endpoint is superseded by the /eth/v1/events Beacon API
  // endpoint
  rpc StreamSlots(StreamSlotsRequest) returns (stream StreamSlotsResponse) {
    option deprecated = true;
    option (google.api.http) = {
      get : "/eth/v1alpha1/validator/blocks/stream_slots"
    };
  }

  // Server-side stream of all signed blocks as they are received by
  // the beacon chain node.
  // DEPRECATED: This endpoint is superseded by the /eth/v1/events Beacon API
  // endpoint
  rpc StreamBlocksAltair(StreamBlocksRequest)
      returns (stream StreamBlocksResponse) {
    option deprecated = true;
    option (google.api.http) = {
      get : "/eth/v1alpha1/validator/blocks/stream"
    };
  }

  rpc SubmitValidatorRegistrations(SignedValidatorRegistrationsV1)
      returns (google.protobuf.Empty) {
    option deprecated = true;
    option (google.api.http) = {
      post : "/eth/v1alpha1/validator/registration"
      body : "*"
    };
  }

  rpc AssignValidatorToSubnet(AssignValidatorToSubnetRequest)
      returns (google.protobuf.Empty) {
    option deprecated = true;
    option (google.api.http) = {
      post : "/eth/v1alpha1/validator/blocks/assign_validator_to_subnet"
      body : "*"
    };
  }

  rpc AggregatedSigAndAggregationBits(AggregatedSigAndAggregationBitsRequest)
      returns (AggregatedSigAndAggregationBitsResponse) {
    option deprecated = true;
    option (google.api.http) = {
      get : "/eth/v1alpha1/validator/blocks/aggregated_sig_and_aggregation_bits"
    };
  }

  // ==========================================================================
  // Gloas Fork Endpoints
  // ==========================================================================

  // GetExecutionPayloadEnvelope retrieves a cached execution payload envelope
  // for the given slot and builder index. This is called by validators after
  // receiving a Gloas block to get the envelope they need to sign and broadcast.
  //
  // The envelope is cached by the beacon node during block production and
  // contains the full execution payload that corresponds to the bid in the block.
  rpc GetExecutionPayloadEnvelope(ExecutionPayloadEnvelopeRequest)
      returns (ExecutionPayloadEnvelopeResponse) {
    option deprecated = true;
    option (google.api.http) = {
      get : "/eth/v1alpha1/validator/execution_payload_envelope/{slot}"
    };
  }

  // PublishExecutionPayloadEnvelope broadcasts a signed execution payload envelope
  // to the P2P network. This is called by validators after signing the envelope
  // retrieved from GetExecutionPayloadEnvelope.
  //
  // The beacon node validates the envelope signature and broadcasts it to peers
  // via the execution_payload_envelope gossip topic.
  rpc PublishExecutionPayloadEnvelope(SignedExecutionPayloadEnvelope)
      returns (google.protobuf.Empty) {
    option deprecated = true;
    option (google.api.http) = {
      post : "/eth/v1alpha1/validator/execution_payload_envelope"
      body : "*"
    };
  }

  // PayloadAttestationData retrieves payload attestation data for the given slot.
  rpc PayloadAttestationData(PayloadAttestationDataRequest)
      returns (.ethereum.eth.v1alpha1.PayloadAttestationData) {
    option deprecated = true;
    option (google.api.http) = {
      get : "/eth/v1alpha1/validator/payload_attestation_data/{slot}"
    };
  }

  // SubmitPayloadAttestation broadcasts a signed payload attestation message.
  rpc SubmitPayloadAttestation(PayloadAttestationMessage)
      returns (google.protobuf.Empty) {
    option deprecated = true;
    option (google.api.http) = {
      post : "/eth/v1alpha1/validator/payload_attestation"
      body : "*"
    };
  }
}

// SyncMessageBlockRootResponse for beacon chain validator to retrieve and
// to sign over the block root as part of sync committee duty to facilitate
// light client.
message SyncMessageBlockRootResponse {
  option deprecated = true;

  // The block root of the head block.
  bytes root = 1 [ (ethereum.eth.ext.ssz_size) = "32" ];
}

// SyncSubcommitteeIndexRequest requests sync subcommittee index given the
// validator public key.
message SyncSubcommitteeIndexRequest {
  option deprecated = true;

  // The validator's public key.
  bytes public_key = 1 [ (ethereum.eth.ext.ssz_size) = "48" ];
  // The slot of validator's assignment.
  uint64 slot = 2 [
    (ethereum.eth.ext.cast_type) =
        "github.com/OffchainLabs/prysm/v7/consensus-types/primitives.Slot"
  ];
}

message SyncCommitteeContributionRequest {
  option deprecated = true;

  // Slot for which the aggregation request applies.
  uint64 slot = 1 [
    (ethereum.eth.ext.cast_type) =
        "github.com/OffchainLabs/prysm/v7/consensus-types/primitives.Slot"
  ];
  // 48 byte public key of the validator.
  bytes public_key = 2 [
    (ethereum.eth.ext.ssz_size) = "48",
    (ethereum.eth.ext.spec_name) = "pubkey"
  ];
  // Subnet ID of where this contribution and proof should be broadcast to.
  uint64 subnet_id = 3;
}

// SyncSubcommitteeIndexResponse responds index of the sync subcommittee of a
// given validator.
message SyncSubcommitteeIndexResponse {
  option deprecated = true;

  // The subcommittee index itself.
  // If the total validator count is not sufficient, there could be more than
  // one index.
  repeated uint64 indices = 1
      [ (ethereum.eth.ext.cast_type) =
            "github.com/OffchainLabs/prysm/v7/consensus-types/"
            "primitives.CommitteeIndex" ];
}

// DEPRECATED: This endpoint StreamSlots is superseded by the /eth/v1/events
// Beacon API endpoint
message StreamSlotsResponse {
  option deprecated = true;

  uint64 slot = 1 [
    (ethereum.eth.ext.cast_type) =
        "github.com/OffchainLabs/prysm/v7/consensus-types/primitives.Slot"
  ];
  bytes previous_duty_dependent_root = 2 [ (ethereum.eth.ext.ssz_size) = "32" ];
  bytes current_duty_dependent_root = 3 [ (ethereum.eth.ext.ssz_size) = "32" ];
}

// DEPRECATED: This endpoint StreamBlocks is superseded by the /eth/v1/events
// Beacon API endpoint
message StreamBlocksResponse {
  option deprecated = true;

  oneof block {
    // Representing a phase 0 block.
    SignedBeaconBlock phase0_block = 1;

    // Representing an altair block.
    SignedBeaconBlockAltair altair_block = 2;

    // Representing a bellatrix block.
    SignedBeaconBlockBellatrix bellatrix_block = 3;

    // Representing a capella block.
    SignedBeaconBlockCapella capella_block = 4;

    // Representing a deneb block.
    SignedBeaconBlockDeneb deneb_block = 5;

    // Representing an electra block.
    SignedBeaconBlockElectra electra_block = 6;

    // Representing a fulu block.
    SignedBeaconBlockFulu fulu_block = 7;
  }
}

message DomainRequest {
  option deprecated = true;

  // The epoch for which the domain is being requested.
  uint64 epoch = 1 [
    (ethereum.eth.ext.cast_type) =
        "github.com/OffchainLabs/prysm/v7/consensus-types/primitives.Epoch"
  ];

  // The bytes domain specified by the validator.
  bytes domain = 2;
}

message DomainResponse {
  option deprecated = true;

  // The signature domain is a byte array used by validators when
  // signing data related to block proposals and attestations.
  bytes signature_domain = 1;
}

message ValidatorActivationRequest {
  option deprecated = true;

  // A list of 48 byte validator public keys.
  repeated bytes public_keys = 1 [ (ethereum.eth.ext.ssz_size) = "?,48" ];
}

message ValidatorActivationResponse {
  option deprecated = true;

  message Status {
    // A 48 byte validator public key.
    bytes public_key = 1;

    // A wrapper representing a validator's status object.
    ValidatorStatusResponse status = 2;

    // The validators index in the beacon state.
    uint64 index = 3 [ (ethereum.eth.ext.cast_type) =
                           "github.com/OffchainLabs/prysm/v7/consensus-types/"
                           "primitives.ValidatorIndex" ];
  }
  // A list of validator statuses mapped 1-to-1 with the public keys
  // in the request.
  repeated Status statuses = 1;
}

message ChainStartResponse {
  option deprecated = true;

  // A boolean specifying whether or not the chain has started.
  bool started = 1;

  // The genesis time of the beacon chain.
  uint64 genesis_time = 2;

  // 32 byte hash tree root of the genesis validator set.
  bytes genesis_validators_root = 3 [ (ethereum.eth.ext.ssz_size) = "32" ];
}

message SyncedResponse {
  // A boolean specifying whether or not the beacon node is synced and ready for
  // the validator.
  bool synced = 1;

  // The genesis time of the beacon chain.
  uint64 genesis_time = 2;
}

message ValidatorIndexRequest {
  option deprecated = true;

  // A 48 byte validator public key.
  bytes public_key = 1 [ (ethereum.eth.ext.ssz_size) = "48" ];
}

message ValidatorIndexResponse {
  option deprecated = true;

  // The validator's index in the beacon chain state's validator registry.
  uint64 index = 1 [ (ethereum.eth.ext.cast_type) =
                         "github.com/OffchainLabs/prysm/v7/consensus-types/"
                         "primitives.ValidatorIndex" ];
}

message ValidatorStatusRequest {
  option deprecated = true;

  // A 48 byte validator public key.
  bytes public_key = 1 [ (ethereum.eth.ext.ssz_size) = "48" ];
}

