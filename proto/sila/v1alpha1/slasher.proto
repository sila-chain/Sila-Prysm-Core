syntax = "proto3";

package sila.consensus.v1alpha1;

import "proto/silaapi/ext/options.proto";

option csharp_namespace = "Sila.Consensus.V1alpha1";
option go_package = "github.com/sila-chain/Sila-Consensus-Core/v7/proto/sila/v1alpha1;v1alpha1";
option java_multiple_files = true;
option java_outer_classname = "SlasherProto";
option java_package = "org.sila.consensus.v1alpha1";
option php_namespace = "Sila\\Consensus\\v1alpha1";

message HighestAttestation {
  uint64 validator_index = 1;
  uint64 highest_source_epoch = 2 [
    (sila.consensus.ext.cast_type) =
        "github.com/sila-chain/Sila-Consensus-Core/v7/consensus-types/primitives.Epoch"
  ];
  uint64 highest_target_epoch = 3 [
    (sila.consensus.ext.cast_type) =
        "github.com/sila-chain/Sila-Consensus-Core/v7/consensus-types/primitives.Epoch"
  ];
}