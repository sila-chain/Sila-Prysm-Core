syntax = "proto3";

package sila.consensus.v1alpha1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

option csharp_namespace = "Sila.Consensus.V1alpha1";
option go_package = "github.com/sila-chain/Sila-Consensus-Core/v7/proto/sila/v1alpha1;v1alpha1";
option java_multiple_files = true;
option java_outer_classname = "HealthProto";
option java_package = "org.sila.consensus.v1alpha1";
option php_namespace = "Sila\\Consensus\\v1alpha1";

// Health service API
//
// The health service is able to return important metadata about a beacon node
// such being able to stream logs via gRPC.
service Health {
  rpc StreamBeaconLogs(google.protobuf.Empty) returns (stream LogsResponse) {
    option deprecated = true;
    option (google.api.http) = {
      get : "/sila/v1alpha1/health/logs/stream"
    };
  }
}

message LogsResponse {
  option deprecated = true;

  repeated string logs = 1;
}
