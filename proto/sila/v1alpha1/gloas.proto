syntax = "proto3";

package sila.eth.v1alpha1;

import "proto/silaengine/v1/sila_engine.proto";
import "proto/silaengine/v1/electra.proto";
import "proto/silaapi/ext/options.proto";
import "proto/sila/v1alpha1/attestation.proto";
import "proto/sila/v1alpha1/withdrawals.proto";
import "proto/sila/v1alpha1/beacon_core_types.proto";
import "proto/sila/v1alpha1/sip_7251.proto";

option go_package = "github.com/sila-chain/Sila-Consensus-Core/v7/proto/sila/v1alpha1;eth";

// =============================================================================
// Gloas Fork Specification
// =============================================================================
// This file implements the Gloas fork of the Sila consensus specification
// Reference:
// https://github.com/sila-chain/Sila-Consensus-Specs/blob/master/specs/gloas/beacon-chain.md

// SilaPayloadBid represents an sila payload bid in the Gloas fork.
//
// Spec:
// class SilaPayloadBid(Container):
//     parent_block_hash: Hash32
//     parent_block_root: Root
//     block_hash: Hash32
//     prev_randao: Bytes32
//     fee_recipient: ExecutionAddress
//     gas_limit: uint64
//     builder_index: BuilderIndex
//     slot: Slot
//     value: Gwei
//     execution_payment: Gwei
//     blob_kzg_commitments: List[KZGCommitment, MAX_BLOB_COMMITMENTS_PER_BLOCK]
//     sila_requests_root: Root
message SilaPayloadBid {
  bytes parent_block_hash = 1 [ (sila.eth.ext.ssz_size) = "32" ];
  bytes parent_block_root = 2 [ (sila.eth.ext.ssz_size) = "32" ];
  bytes block_hash = 3 [ (sila.eth.ext.ssz_size) = "32" ];
  bytes prev_randao = 4 [ (sila.eth.ext.ssz_size) = "32" ];
  bytes fee_recipient = 5 [ (sila.eth.ext.ssz_size) = "20" ];
  uint64 gas_limit = 6;
  uint64 builder_index = 7 [ (sila.eth.ext.cast_type) =
                                 "github.com/sila-chain/Sila-Consensus-Core/v7/"
                                 "consensus-types/primitives.BuilderIndex" ];
  uint64 slot = 8 [
    (sila.eth.ext.cast_type) =
        "github.com/sila-chain/Sila-Consensus-Core/v7/consensus-types/primitives.Slot"
  ];
  uint64 value = 9 [
    (sila.eth.ext.cast_type) =
        "github.com/sila-chain/Sila-Consensus-Core/v7/consensus-types/primitives.Gwei"
  ];
  uint64 execution_payment = 10 [
    (sila.eth.ext.cast_type) =
        "github.com/sila-chain/Sila-Consensus-Core/v7/consensus-types/primitives.Gwei"
  ];
  repeated bytes blob_kzg_commitments = 11 [
    (sila.eth.ext.ssz_size) = "?,48",
    (sila.eth.ext.ssz_max) = "max_blob_commitments.size"
  ];
  bytes sila_requests_root = 12 [ (sila.eth.ext.ssz_size) = "32" ];
}

// SignedSilaPayloadBid wraps an sila payload bid with a signature.
//
// Spec:
// class SignedSilaPayloadBid(Container):
//     message: SilaPayloadBid
//     signature: BLSSignature
message SignedSilaPayloadBid {
  SilaPayloadBid message = 1;
  bytes signature = 2 [ (sila.eth.ext.ssz_size) = "96" ];
}

// ProposerPreferences communicates a proposer fee recipient and target gas
// limit for a future proposal slot.
//
// Spec:
// class ProposerPreferences(Container):
//     dependent_root: Root
//     proposal_slot: Slot
//     validator_index: ValidatorIndex
//     fee_recipient: ExecutionAddress
//     target_gas_limit: uint64
message ProposerPreferences {
  bytes dependent_root = 1 [ (sila.eth.ext.ssz_size) = "32" ];
  uint64 proposal_slot = 2 [
    (sila.eth.ext.cast_type) =
        "github.com/sila-chain/Sila-Consensus-Core/v7/consensus-types/primitives.Slot"
  ];
  uint64 validator_index = 3
      [ (sila.eth.ext.cast_type) =
            "github.com/sila-chain/Sila-Consensus-Core/v7/consensus-types/"
            "primitives.ValidatorIndex" ];
  bytes fee_recipient = 4 [ (sila.eth.ext.ssz_size) = "20" ];
  uint64 target_gas_limit = 5;
}

// SignedProposerPreferences wraps proposer preferences with a signature.
//
// Spec:
// class SignedProposerPreferences(Container):
//     message: ProposerPreferences
//     signature: BLSSignature
message SignedProposerPreferences {
  ProposerPreferences message = 1;
  bytes signature = 2 [ (sila.eth.ext.ssz_size) = "96" ];
}

// SubmitSignedProposerPreferencesRequest wraps multiple signed proposer
// preferences for batch submission via gRPC.
message SubmitSignedProposerPreferencesRequest {
  repeated SignedProposerPreferences signed_proposer_preferences = 1;
}

// PayloadAttestationData contains the core data for Payload Timeliness
// Committee (PTC) attestations.
//
// Spec:
// class PayloadAttestationData(Container):
//     beacon_block_root: Root
//     slot: Slot
//     payload_present: boolean
//     blob_data_available: boolean
message PayloadAttestationData {
  bytes beacon_block_root = 1 [ (sila.eth.ext.ssz_size) = "32" ];
  uint64 slot = 2 [
    (sila.eth.ext.cast_type) =
        "github.com/sila-chain/Sila-Consensus-Core/v7/consensus-types/primitives.Slot"
  ];
  bool payload_present = 3;
  bool blob_data_available = 4;
}

// PayloadAttestation represents an aggregated attestation from the Payload
// Timeliness Committee (PTC).
//
// Spec:
// class PayloadAttestation(Container):
//     aggregation_bits: Bitvector[PTC_SIZE]
//     data: PayloadAttestationData
//     signature: BLSSignature
message PayloadAttestation {
  bytes aggregation_bits = 1 [
    (sila.eth.ext.ssz_size) = "ptc.size",
    (sila.eth.ext.cast_type) = "ptc.type"
  ];
  PayloadAttestationData data = 2;
  bytes signature = 3 [ (sila.eth.ext.ssz_size) = "96" ];
}

// PayloadAttestationMessage represents an individual payload attestation
// message.
//
// Spec:
// class PayloadAttestationMessage(Container):
//     validator_index: ValidatorIndex
//     data: PayloadAttestationData
//     signature: BLSSignature
message PayloadAttestationMessage {
  uint64 validator_index = 1
      [ (sila.eth.ext.cast_type) =
            "github.com/sila-chain/Sila-Consensus-Core/v7/consensus-types/"
            "primitives.ValidatorIndex" ];
  PayloadAttestationData data = 2;
  bytes signature = 3 [ (sila.eth.ext.ssz_size) = "96" ];
}

// BeaconBlockGloas represents a beacon block in the Gloas fork.
// The block structure remains the same but contains a modified
// BeaconBlockBodyGloas.
message BeaconBlockGloas {
  uint64 slot = 1 [
    (sila.eth.ext.cast_type) =
        "github.com/sila-chain/Sila-Consensus-Core/v7/consensus-types/primitives.Slot"
  ];
  uint64 proposer_index = 2 [ (sila.eth.ext.cast_type) =
                                  "github.com/sila-chain/Sila-Consensus-Core/v7/"
                                  "consensus-types/primitives.ValidatorIndex" ];
  bytes parent_root = 3 [ (sila.eth.ext.ssz_size) = "32" ];
  bytes state_root = 4 [ (sila.eth.ext.ssz_size) = "32" ];
  BeaconBlockBodyGloas body = 5;
}

// BeaconBlockBodyGloas represents the body of a beacon block in the Gloas fork.
// New fields: signed_sila_payload_bid, payload_attestations, parent_sila_requests
// Removed fields: sila_payload, blob_kzg_commitments, sila_requests
//
// Spec:
// class BeaconBlockBody(Container):
//     randao_reveal: BLSSignature
//     sila_data: SilaData
//     graffiti: Bytes32
//     proposer_slashings: List[ProposerSlashing, MAX_PROPOSER_SLASHINGS]
//     attester_slashings: List[AttesterSlashing, MAX_ATTESTER_SLASHINGS_ELECTRA]
//     attestations: List[Attestation, MAX_ATTESTATIONS_ELECTRA]
//     deposits: List[Deposit, MAX_DEPOSITS]
//     voluntary_exits: List[SignedVoluntaryExit, MAX_VOLUNTARY_EXITS]
//     sync_aggregate: SyncAggregate
//     bls_to_sila_changes: List[SignedBLSToSilaChange, MAX_BLS_TO_SILA_CHANGES]
//     signed_sila_payload_bid: SignedSilaPayloadBid
//     payload_attestations: List[PayloadAttestation, MAX_PAYLOAD_ATTESTATIONS]
//     parent_sila_requests: SilaRequests
message BeaconBlockBodyGloas {
  bytes randao_reveal = 1 [ (sila.eth.ext.ssz_size) = "96" ];
  SilaData sila_data = 2;
  bytes graffiti = 3 [ (sila.eth.ext.ssz_size) = "32" ];
  repeated ProposerSlashing proposer_slashings = 4
      [ (sila.eth.ext.ssz_max) = "16" ];
  repeated AttesterSlashingElectra attester_slashings = 5
      [ (sila.eth.ext.ssz_max) = "1" ];
  repeated AttestationElectra attestations = 6
      [ (sila.eth.ext.ssz_max) = "8" ];
  repeated Deposit deposits = 7 [ (sila.eth.ext.ssz_max) = "16" ];
  repeated SignedVoluntaryExit voluntary_exits = 8
      [ (sila.eth.ext.ssz_max) = "16" ];
  SyncAggregate sync_aggregate = 9;
  repeated SignedBLSToSilaChange bls_to_sila_changes = 10
      [ (sila.eth.ext.ssz_max) = "16" ];

  // New in Gloas
  SignedSilaPayloadBid signed_sila_payload_bid = 11;
  repeated PayloadAttestation payload_attestations = 12
      [ (sila.eth.ext.ssz_max) = "payload_attestation.size" ];
  sila.silaengine.v1.SilaRequests parent_sila_requests = 13;
}

// SignedBeaconBlockGloas represents a signed beacon block in the Gloas fork.
//
// Spec:
// Standard SignedBeaconBlock structure with BeaconBlockGloas
message SignedBeaconBlockGloas {
  BeaconBlockGloas block = 1;
  bytes signature = 2 [ (sila.eth.ext.ssz_size) = "96" ];
}

// BeaconStateGloas represents the beacon state in the Gloas fork.
//
// Spec:
// class BeaconState(Container):
//     [All previous fields from earlier forks]
//     # Replaced existing latest execution header position
//     latest_block_hash: Hash32
//     builders: List[Builder, BUILDER_REGISTRY_LIMIT]
//     # [New in Gloas:SIP7732]
//     next_withdrawal_builder_index: BuilderIndex
//     # [New in Gloas:SIP7732]
//     sila_payload_availability: Bitvector[SLOTS_PER_HISTORICAL_ROOT]
//     builder_pending_payments: Vector[BuilderPendingPayment, 2 *
//     SLOTS_PER_EPOCH] builder_pending_withdrawals:
//     List[BuilderPendingWithdrawal, BUILDER_PENDING_WITHDRAWALS_LIMIT]
//     latest_sila_payload_bid: SilaPayloadBid
//     payload_expected_withdrawals: List[Withdrawal,
//     MAX_WITHDRAWALS_PER_PAYLOAD]
//     ptc_window:
//     Vector[PTCs, (2 + MIN_SEED_LOOKAHEAD) * SLOTS_PER_EPOCH]
message BeaconStateGloas {
  // Versioning [1001-2000]
  uint64 genesis_time = 1001;
  bytes genesis_validators_root = 1002 [ (sila.eth.ext.ssz_size) = "32" ];
  uint64 slot = 1003 [
    (sila.eth.ext.cast_type) =
        "github.com/sila-chain/Sila-Consensus-Core/v7/consensus-types/primitives.Slot"
  ];
  Fork fork = 1004;

  // History [2001-3000]
  BeaconBlockHeader latest_block_header = 2001;
  repeated bytes block_roots = 2002
      [ (sila.eth.ext.ssz_size) = "block_roots.size" ];
  repeated bytes state_roots = 2003
      [ (sila.eth.ext.ssz_size) = "state_roots.size" ];
  repeated bytes historical_roots = 2004 [
    (sila.eth.ext.ssz_size) = "?,32",
    (sila.eth.ext.ssz_max) = "16777216"
  ];

  // SilaExecution [3001-4000]
  SilaData sila_data = 3001;
  repeated SilaData sila_data_votes = 3002
      [ (sila.eth.ext.ssz_max) = "sila_data_votes.size" ];
  uint64 silaexec_deposit_index = 3003;

  // Registry [4001-5000]
  repeated Validator validators = 4001
      [ (sila.eth.ext.ssz_max) = "1099511627776" ];
  repeated uint64 balances = 4002
      [ (sila.eth.ext.ssz_max) = "1099511627776" ];

  // Randomness [5001-6000]
  repeated bytes randao_mixes = 5001
      [ (sila.eth.ext.ssz_size) = "randao_mixes.size" ];

  // Slashings [6001-7000]
  repeated uint64 slashings = 6001
      [ (sila.eth.ext.ssz_size) = "slashings.size" ];

  // Participation [7001-8000]
  bytes previous_epoch_participation = 7001
      [ (sila.eth.ext.ssz_max) = "1099511627776" ];
  bytes current_epoch_participation = 7002
      [ (sila.eth.ext.ssz_max) = "1099511627776" ];

  // Finality [8001-9000]
  bytes justification_bits = 8001 [
    (sila.eth.ext.ssz_size) = "1",
    (sila.eth.ext.cast_type) =
        "github.com/sila-chain/go-bitfield.Bitvector4"
  ];
  Checkpoint previous_justified_checkpoint = 8002;
  Checkpoint current_justified_checkpoint = 8003;
  Checkpoint finalized_checkpoint = 8004;

  // Fields introduced in Altair fork [9001-10000]
  repeated uint64 inactivity_scores = 9001
      [ (sila.eth.ext.ssz_max) = "1099511627776" ];
  SyncCommittee current_sync_committee = 9002;
  SyncCommittee next_sync_committee = 9003;

  // Note: latest_sila_payload_header replaced with latest_block_hash in
  // Gloas
  bytes latest_block_hash = 10001 [ (sila.eth.ext.ssz_size) = "32" ];

  // Fields introduced in Capella fork [11001-12000]
  uint64 next_withdrawal_index = 11001;
  uint64 next_withdrawal_validator_index = 11002
      [ (sila.eth.ext.cast_type) =
            "github.com/sila-chain/Sila-Consensus-Core/v7/consensus-types/"
            "primitives.ValidatorIndex" ];
  repeated HistoricalSummary historical_summaries = 11003
      [ (sila.eth.ext.ssz_max) = "16777216" ];

  // Fields introduced in Electra fork [12001-13000]
  uint64 deposit_requests_start_index = 12001;
  uint64 deposit_balance_to_consume = 12002 [
    (sila.eth.ext.cast_type) =
        "github.com/sila-chain/Sila-Consensus-Core/v7/consensus-types/primitives.Gwei"
  ];
  uint64 exit_balance_to_consume = 12003 [
    (sila.eth.ext.cast_type) =
        "github.com/sila-chain/Sila-Consensus-Core/v7/consensus-types/primitives.Gwei"
  ];
  uint64 earliest_exit_epoch = 12004 [
    (sila.eth.ext.cast_type) =
        "github.com/sila-chain/Sila-Consensus-Core/v7/consensus-types/primitives.Epoch"
  ];
  uint64 consolidation_balance_to_consume = 12005 [
    (sila.eth.ext.cast_type) =
        "github.com/sila-chain/Sila-Consensus-Core/v7/consensus-types/primitives.Gwei"
  ];
  uint64 earliest_consolidation_epoch = 12006 [
    (sila.eth.ext.cast_type) =
        "github.com/sila-chain/Sila-Consensus-Core/v7/consensus-types/primitives.Epoch"
  ];
  repeated PendingDeposit pending_deposits = 12007
      [ (sila.eth.ext.ssz_max) = "pending_deposits_limit" ];
  repeated PendingPartialWithdrawal pending_partial_withdrawals = 12008
      [ (sila.eth.ext.ssz_max) = "pending_partial_withdrawals_limit" ];
  repeated PendingConsolidation pending_consolidations = 12009
      [ (sila.eth.ext.ssz_max) = "pending_consolidations_limit" ];

  // Fields introduced in Fulu fork [13001-14000]
  repeated uint64 proposer_lookahead = 13001 [
    (sila.eth.ext.ssz_size) = "proposer_lookahead_size",
    (sila.eth.ext.cast_type) =
        "github.com/sila-chain/Sila-Consensus-Core/v7/consensus-types/"
        "primitives.ValidatorIndex"
  ];

  // Fields introduced in Gloas fork [14001-15000]
  repeated Builder builders = 14001
      [ (sila.eth.ext.ssz_max) = "builder_registry_limit" ];
  uint64 next_withdrawal_builder_index = 14002
      [ (sila.eth.ext.cast_type) =
            "github.com/sila-chain/Sila-Consensus-Core/v7/consensus-types/"
            "primitives.BuilderIndex" ];
  bytes sila_payload_availability = 14003
      [ (sila.eth.ext.ssz_size) = "sila_payload_availability.size" ];
  repeated BuilderPendingPayment builder_pending_payments = 14004
      [ (sila.eth.ext.ssz_size) = "builder_pending_payments.size" ];
  repeated BuilderPendingWithdrawal builder_pending_withdrawals = 14005
      [ (sila.eth.ext.ssz_max) = "1048576" ];
  SilaPayloadBid latest_sila_payload_bid = 14006;
  repeated sila.silaengine.v1.Withdrawal payload_expected_withdrawals = 14007
      [ (sila.eth.ext.ssz_max) = "withdrawal.size" ];
  repeated PTCs ptc_window = 14008
      [ (sila.eth.ext.ssz_size) = "ptc_window.size" ];
}

// PTCs represents the payload timeliness committee for a single slot.
//
// Spec:
// Vector[ValidatorIndex, PTC_SIZE]
message PTCs {
  repeated uint64 validator_indices = 1 [
    (sila.eth.ext.ssz_size) = "ptc_committee_indices.size",
    (sila.eth.ext.cast_type) =
        "github.com/sila-chain/Sila-Consensus-Core/v7/consensus-types/"
        "primitives.ValidatorIndex"
  ];
}

// BeaconBlockContentsGloas bundles a Gloas beacon block with the execution
// payload envelope and associated blob data. This is used for block production
// when include_payload=true.
message BeaconBlockContentsGloas {
  BeaconBlockGloas block = 1;
  SilaPayloadEnvelope sila_payload_envelope = 2;
  repeated bytes kzg_proofs = 3 [
    (sila.eth.ext.ssz_size) = "?,48",
    (sila.eth.ext.ssz_max) = "max_cell_proofs_length.size"
  ];
  repeated bytes blobs = 4 [
    (sila.eth.ext.ssz_size) = "?,blob.size",
    (sila.eth.ext.ssz_max) = "max_blob_commitments.size"
  ];
}

// SignedSilaPayloadEnvelopeContents bundles a signed sila payload
// envelope with the raw blobs and KZG proofs needed by a beacon node that has
// not cached them locally. Used by the stateless publish path of
// POST /sila/v1/beacon/sila_payload_envelopes.
message SignedSilaPayloadEnvelopeContents {
  SignedSilaPayloadEnvelope signed_sila_payload_envelope = 1;
  repeated bytes kzg_proofs = 2 [
    (sila.eth.ext.ssz_size) = "?,48",
    (sila.eth.ext.ssz_max) = "max_cell_proofs_length.size"
  ];
  repeated bytes blobs = 3 [
    (sila.eth.ext.ssz_size) = "?,blob.size",
    (sila.eth.ext.ssz_max) = "max_blob_commitments.size"
  ];
}

// BuilderPendingPayment represents a pending payment to a builder.
//
// Spec:
// class BuilderPendingPayment(Container):
//     weight: Gwei
//     withdrawal: BuilderPendingWithdrawal
message BuilderPendingPayment {
  uint64 weight = 1 [
    (sila.eth.ext.cast_type) =
        "github.com/sila-chain/Sila-Consensus-Core/v7/consensus-types/primitives.Gwei"
  ];
  BuilderPendingWithdrawal withdrawal = 2;
}

// BuilderPendingWithdrawal represents a pending withdrawal for a builder.
//
// Spec:
// class BuilderPendingWithdrawal(Container):
//     fee_recipient: ExecutionAddress
//     amount: Gwei
//     builder_index: BuilderIndex
message BuilderPendingWithdrawal {
  bytes fee_recipient = 1 [ (sila.eth.ext.ssz_size) = "20" ];
  uint64 amount = 2 [
    (sila.eth.ext.cast_type) =
        "github.com/sila-chain/Sila-Consensus-Core/v7/consensus-types/primitives.Gwei"
  ];
  uint64 builder_index = 3
      [ (sila.eth.ext.cast_type) =
            "github.com/sila-chain/Sila-Consensus-Core/v7/consensus-types/"
            "primitives.BuilderIndex" ];
}

// DataColumnSidecarGloas represents a data column sidecar in the Gloas fork.
// Note: signed_block_header and kzg_commitments_inclusion_proof fields have
// been removed in Gloas.
//
// Spec:
// class DataColumnSidecar(Container):
//     index: ColumnIndex
//     column: List[Cell, MAX_BLOB_COMMITMENTS_PER_BLOCK]
//     kzg_proofs: List[KZGProof, MAX_BLOB_COMMITMENTS_PER_BLOCK]
//     slot: Slot
//     beacon_block_root: Root
message DataColumnSidecarGloas {
  uint64 index = 1;
  repeated bytes column = 2 [
    (sila.eth.ext.ssz_size) = "?,bytes_per_cell.size",
    (sila.eth.ext.ssz_max) = "max_blob_commitments.size"
  ];
  repeated bytes kzg_proofs = 4 [
    (sila.eth.ext.ssz_size) = "?,48",
    (sila.eth.ext.ssz_max) = "max_blob_commitments.size"
  ];
  uint64 slot = 5 [
    (sila.eth.ext.cast_type) =
        "github.com/sila-chain/Sila-Consensus-Core/v7/consensus-types/primitives.Slot"
  ];
  bytes beacon_block_root = 6 [ (sila.eth.ext.ssz_size) = "32" ];
}

// SilaPayloadEnvelope wraps an sila payload with builder index.
// This is used in the Gloas fork to associate sila payloads with their
// builders and provide additional context needed for payload processing.
//
// Spec:
// class SilaPayloadEnvelope(Container):
//     payload: SilaPayload
//     sila_requests: SilaRequests
//     builder_index: BuilderIndex
//     beacon_block_root: Root
//     parent_beacon_block_root: Root
message SilaPayloadEnvelope {
  sila.silaengine.v1.SilaPayloadGloas payload = 1;
  sila.silaengine.v1.SilaRequests sila_requests = 2;
  uint64 builder_index = 3 [ (sila.eth.ext.cast_type) =
                                 "github.com/sila-chain/Sila-Consensus-Core/v7/"
                                 "consensus-types/primitives.BuilderIndex" ];
  bytes beacon_block_root = 4 [ (sila.eth.ext.ssz_size) = "32" ];
  bytes parent_beacon_block_root = 5 [ (sila.eth.ext.ssz_size) = "32" ];
}

// SignedSilaPayloadEnvelope wraps an sila payload envelope with a
// signature. The signature is provided by the builder who created the execution
// payload.
//
// Spec:
// class SignedSilaPayloadEnvelope(Container):
//     message: SilaPayloadEnvelope
//     signature: BLSSignature
message SignedSilaPayloadEnvelope {
  SilaPayloadEnvelope message = 1;
  bytes signature = 2 [ (sila.eth.ext.ssz_size) = "96" ];
}

// BlindedSilaPayloadEnvelope is a storage-only envelope that replaces the
// full sila payload with its block hash for space savings. The full
// payload can be retrieved from the EL via silaEngine_getPayloadBodiesByHash using
// the block_hash.
message BlindedSilaPayloadEnvelope {
  bytes block_hash = 1 [ (sila.eth.ext.ssz_size) = "32" ];
  sila.silaengine.v1.SilaRequests sila_requests = 2;
  uint64 builder_index = 3 [ (sila.eth.ext.cast_type) =
                                 "github.com/sila-chain/Sila-Consensus-Core/v7/"
                                 "consensus-types/primitives.BuilderIndex" ];
  bytes beacon_block_root = 4 [ (sila.eth.ext.ssz_size) = "32" ];
  uint64 slot = 5 [
    (sila.eth.ext.cast_type) =
        "github.com/sila-chain/Sila-Consensus-Core/v7/consensus-types/primitives.Slot"
  ];
  bytes parent_block_hash = 7 [ (sila.eth.ext.ssz_size) = "32" ];
  bytes parent_beacon_block_root = 8 [ (sila.eth.ext.ssz_size) = "32" ];
}

// SignedBlindedSilaPayloadEnvelope wraps a blinded sila payload
// envelope with a signature.
message SignedBlindedSilaPayloadEnvelope {
  BlindedSilaPayloadEnvelope message = 1;
  bytes signature = 2 [ (sila.eth.ext.ssz_size) = "96" ];
}

// WireBlindedSilaPayloadEnvelope is the beacon-APIs #580 wire form: payload replaced by
// payload_root so HTR matches the full envelope. Distinct from the storage-form BlindedSilaPayloadEnvelope above.
message WireBlindedSilaPayloadEnvelope {
  bytes payload_root = 1 [ (sila.eth.ext.ssz_size) = "32" ];
  sila.silaengine.v1.SilaRequests sila_requests = 2;
  uint64 builder_index = 3 [ (sila.eth.ext.cast_type) =
                                 "github.com/sila-chain/Sila-Consensus-Core/v7/"
                                 "consensus-types/primitives.BuilderIndex" ];
  bytes beacon_block_root = 4 [ (sila.eth.ext.ssz_size) = "32" ];
  bytes parent_beacon_block_root = 5 [ (sila.eth.ext.ssz_size) = "32" ];
}

message SignedWireBlindedSilaPayloadEnvelope {
  WireBlindedSilaPayloadEnvelope message = 1;
  bytes signature = 2 [ (sila.eth.ext.ssz_size) = "96" ];
}

// Builder represents a builder in the Gloas fork.
//
// Spec:
// class Builder(Container):
//     pubkey: BLSPubkey
//     version: uint8
//     execution_address: ExecutionAddress
//     balance: Gwei
//     deposit_epoch: Epoch
//     withdrawable_epoch: Epoch
message Builder {
  bytes pubkey = 1 [ (sila.eth.ext.ssz_size) = "48" ];
  bytes version = 2 [ (sila.eth.ext.ssz_size) = "1" ];
  bytes execution_address = 3 [ (sila.eth.ext.ssz_size) = "20" ];
  uint64 balance = 4 [
    (sila.eth.ext.cast_type) =
        "github.com/sila-chain/Sila-Consensus-Core/v7/consensus-types/primitives.Gwei"
  ];
  uint64 deposit_epoch = 5 [
    (sila.eth.ext.cast_type) =
        "github.com/sila-chain/Sila-Consensus-Core/v7/consensus-types/primitives.Epoch"
  ];
  uint64 withdrawable_epoch = 6 [
    (sila.eth.ext.cast_type) =
        "github.com/sila-chain/Sila-Consensus-Core/v7/consensus-types/primitives.Epoch"
  ];
}
