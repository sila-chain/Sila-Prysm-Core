syntax = "proto3";
package sila.validator.accounts.v2;

import "proto/silaapi/ext/options.proto";
import "proto/sila/v1alpha1/attestation.proto";
import "proto/sila/v1alpha1/beacon_block.proto";
import "proto/sila/v1alpha1/beacon_core_types.proto";
import "proto/sila/v1alpha1/beacon_state.proto";
import "proto/sila/v1alpha1/gloas.proto";
import "proto/sila/v1alpha1/sync_committee.proto";

option csharp_namespace = "Sila.Validator.Accounts.V2";
option go_package = "github.com/sila-chain/Sila-Consensus-Core/v7/proto/sila/v1alpha1/validator-client;validatorpb";
option java_multiple_files = true;
option java_outer_classname = "KeymanagerProto";
option java_package = "org.sila.validator.accounts.v2";
option php_namespace = "Sila\\Validator\\Accounts\\V2";

// SignRequest is a message type used by a keymanager
// as part of Sila's accounts v2 implementation.
message SignRequest {
  // 48 byte public key corresponding to an associated private key
  // being requested to sign data.
  bytes public_key = 1;

  // Raw bytes signing root the client is requesting to sign. The client is
  // expected to determine these raw bytes from the appropriate BLS
  // signing domain as well as the signing root of the data structure
  // the bytes represent.
  bytes signing_root = 2;

  // Signature domain and the beacon chain objects to allow server to verify
  // the contents and to prevent slashing.
  bytes signature_domain = 3;
  // Beacon chain objects. [100-200]
  oneof object {
    // Phase0 objects.
    sila.consensus.v1alpha1.BeaconBlock block = 101;
    sila.consensus.v1alpha1.AttestationData attestation_data = 102;
    sila.consensus.v1alpha1.AggregateAttestationAndProof
        aggregate_attestation_and_proof = 103;
    sila.consensus.v1alpha1.VoluntaryExit exit = 104;
    uint64 slot = 105 [
      (sila.consensus.ext.cast_type) =
          "github.com/sila-chain/Sila-Consensus-Core/v7/consensus-types/primitives.Slot"
    ];
    uint64 epoch = 106 [
      (sila.consensus.ext.cast_type) =
          "github.com/sila-chain/Sila-Consensus-Core/v7/consensus-types/primitives.Epoch"
    ];

    // Altair objects.
    sila.consensus.v1alpha1.BeaconBlockAltair block_altair = 107;
    sila.consensus.v1alpha1.SyncAggregatorSelectionData
        sync_aggregator_selection_data = 108;
    sila.consensus.v1alpha1.ContributionAndProof contribution_and_proof = 109;
    bytes sync_message_block_root = 110;

    // Bellatrix objects.
    sila.consensus.v1alpha1.BeaconBlockBellatrix block_bellatrix = 111;
    sila.consensus.v1alpha1.BlindedBeaconBlockBellatrix blinded_block_bellatrix =
        112;

    // Builder objects.
    sila.consensus.v1alpha1.ValidatorRegistrationV1 registration = 113;

    // Capella objects.
    sila.consensus.v1alpha1.BeaconBlockCapella block_capella = 114;
    sila.consensus.v1alpha1.BlindedBeaconBlockCapella blinded_block_capella = 115;

    // Deneb objects.
    sila.consensus.v1alpha1.BeaconBlockDeneb block_deneb = 116;
    sila.consensus.v1alpha1.BlindedBeaconBlockDeneb blinded_block_deneb = 117;

    // Electra objects.
    sila.consensus.v1alpha1.BeaconBlockElectra block_electra = 118;
    sila.consensus.v1alpha1.BlindedBeaconBlockElectra blinded_block_electra = 119;
    sila.consensus.v1alpha1.AggregateAttestationAndProofElectra
        aggregate_attestation_and_proof_electra = 120;

    // Fulu objects.
    sila.consensus.v1alpha1.BeaconBlockElectra block_fulu = 121;
    sila.consensus.v1alpha1.BlindedBeaconBlockFulu blinded_block_fulu = 122;

    // Gloas objects.
    sila.consensus.v1alpha1.BeaconBlockGloas block_gloas = 123;
    sila.consensus.v1alpha1.SilaPayloadEnvelope sila_payload_envelope = 124;
    sila.consensus.v1alpha1.PayloadAttestationData payload_attestation_data = 125;
    sila.consensus.v1alpha1.ProposerPreferences proposer_preference = 126;
  }

  reserved 4, 5; // Reserving old, deleted fields.
  uint64 signing_slot = 6 [
    (sila.consensus.ext.cast_type) =
        "github.com/sila-chain/Sila-Consensus-Core/v7/consensus-types/primitives.Slot"
  ];
}

// SignResponse returned by a RemoteSigner gRPC service.
message SignResponse {
  enum Status {
    UNKNOWN = 0;
    SUCCEEDED = 1;
    DENIED = 2;
    FAILED = 3;
  }

  // BLS12-381 signature for the data specified in the request.
  bytes signature = 1;

  // Status of the signing response, standardized as an enum
  // to ensure different remote signing servers follow the
  // same conventions.
  Status status = 2;
}

// ProposerOptionPayload is a property of ProposerSettingsPayload
message ProposerOptionPayload {
  string fee_recipient = 1;
  BuilderConfig builder = 2;
  optional string graffiti = 3;
}

// BuilderConfig is a property of ProposerOptionPayload
message BuilderConfig {
  bool enabled = 1;
  uint64 gas_limit = 2 [
    (sila.consensus.ext.cast_type) =
        "github.com/sila-chain/Sila-Consensus-Core/v7/consensus-types/validator.Uint64"
  ];
  repeated string relays = 3;
}

// ProposerSettingsPayload is used to unmarshal files sent from the validator
// flag as well as safe to bolt db bucket
message ProposerSettingsPayload {
  map<string, ProposerOptionPayload> proposer_config = 1;
  ProposerOptionPayload default_config = 2;
}
