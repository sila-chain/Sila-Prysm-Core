syntax = "proto3";

package sila.eth.v1alpha1;

import "proto/silaapi/ext/options.proto";
import "proto/sila/v1alpha1/beacon_core_types.proto";
import "proto/silaengine/v1/silaengine.proto";

option csharp_namespace = "Sila.Eth.V1alpha1";
option go_package = "github.com/sila-chain/Sila-Consensus-Core/v7/proto/silaapi/v1alpha1;eth";
option java_multiple_files = true;
option java_outer_classname = "LightClientProto";
option java_package = "org.sila.eth.v1alpha1";
option php_namespace = "Sila\\Eth\\v1alpha1";

// ----------------------------------------------------------------------------
// Altair & Bellatrix
// ----------------------------------------------------------------------------

message LightClientBootstrapAltair {
  LightClientHeaderAltair header = 1;
  SyncCommittee current_sync_committee = 2;
  repeated bytes current_sync_committee_branch = 3
      [ (sila.eth.ext.ssz_size) = "5,32" ];
}

message LightClientUpdateAltair {
  LightClientHeaderAltair attested_header = 1;
  SyncCommittee next_sync_committee = 2;
  repeated bytes next_sync_committee_branch = 3
      [ (sila.eth.ext.ssz_size) = "5,32" ];
  LightClientHeaderAltair finalized_header = 4;
  repeated bytes finality_branch = 5 [ (sila.eth.ext.ssz_size) = "6,32" ];
  SyncAggregate sync_aggregate = 6;
  uint64 signature_slot = 7 [
    (sila.eth.ext.cast_type) =
        "github.com/sila-chain/Sila-Consensus-Core/v7/consensus-types/primitives.Slot"
  ];
}

message LightClientFinalityUpdateAltair {
  LightClientHeaderAltair attested_header = 1;
  LightClientHeaderAltair finalized_header = 2;
  repeated bytes finality_branch = 3 [ (sila.eth.ext.ssz_size) = "6,32" ];
  SyncAggregate sync_aggregate = 4;
  uint64 signature_slot = 5 [
    (sila.eth.ext.cast_type) =
        "github.com/sila-chain/Sila-Consensus-Core/v7/consensus-types/primitives.Slot"
  ];
}

message LightClientOptimisticUpdateAltair {
  LightClientHeaderAltair attested_header = 1;
  SyncAggregate sync_aggregate = 2;
  uint64 signature_slot = 3 [
    (sila.eth.ext.cast_type) =
        "github.com/sila-chain/Sila-Consensus-Core/v7/consensus-types/primitives.Slot"
  ];
}

message LightClientHeaderAltair { BeaconBlockHeader beacon = 1; }

