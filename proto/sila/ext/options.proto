syntax = "proto3";

package sila.consensus.ext;

import "google/protobuf/descriptor.proto";

option csharp_namespace = "Sila.Consensus.ext";
option go_package = "github.com/sila-chain/Sila-Consensus-Core/v7/proto/sila/ext";
option java_multiple_files = true;
option java_outer_classname = "OptionsProto";
option java_package = "org.Sila.Consensus.ext";
option php_namespace = "Sila\\Consensus\\ext";

extend google.protobuf.FieldOptions {
  string cast_type = 50000;
  string ssz_size = 50001;
  string ssz_max = 50002;
  string spec_name = 50003;
}