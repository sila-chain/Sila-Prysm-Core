syntax = "proto3";

package sila.consensus.v1;

import "google/protobuf/descriptor.proto";
import "proto/silaapi/ext/options.proto";

option csharp_namespace = "Sila.Consensus.v1";
option go_package = "github.com/sila-chain/Sila-Consensus-Core/v7/proto/sila/v1";
option java_multiple_files = true;
option java_outer_classname = "BeaconEventsProto";
option java_package = "org.Sila.Consensus.v1";
option php_namespace = "Sila\\Consensus\\v1";

message EventHead {
  // Slot of the new chain head.
  uint64 slot = 1 [
    (sila.eth.ext.cast_type) =
        "github.com/sila-chain/Sila-Consensus-Core/v7/consensus-types/primitives.Slot"
  ];

  // Block root of the new chain head.
  bytes block = 2 [ (sila.eth.ext.ssz_size) = "32" ];

  // State root of the new chain head.
  bytes state = 3 [ (sila.eth.ext.ssz_size) = "32" ];

  // Whether or not the new chain head is at an epoch transition.
  bool epoch_transition = 4;

  // The previous dependent root.
  bytes previous_duty_dependent_root = 5 [ (sila.eth.ext.ssz_size) = "32" ];

  // The current dependent root.
  bytes current_duty_dependent_root = 6 [ (sila.eth.ext.ssz_size) = "32" ];

  // Information about optimistic sync.
  bool sila_optimistic = 7;
}

message EventBlock {
  // The slot of the observed block.
  uint64 slot = 1 [
    (sila.eth.ext.cast_type) =
        "github.com/sila-chain/Sila-Consensus-Core/v7/consensus-types/primitives.Slot"
  ];

  // The root of the observed block.
  bytes block = 2 [ (sila.eth.ext.ssz_size) = "32" ];

  // Information about optimistic sync.
  bool sila_optimistic = 3;
}

message EventChainReorg {
  // The slot of the observed reorg.
  uint64 slot = 1 [
    (sila.eth.ext.cast_type) =
        "github.com/sila-chain/Sila-Consensus-Core/v7/consensus-types/primitives.Slot"
  ];

  // Depth of the reorg in slots.
  uint64 depth = 2;

  // Block root of the old head.
  bytes old_head_block = 3 [ (sila.eth.ext.ssz_size) = "32" ];

  // Block root of the new head.
  bytes new_head_block = 4 [ (sila.eth.ext.ssz_size) = "32" ];

  // State root of the old state.
  bytes old_head_state = 5 [ (sila.eth.ext.ssz_size) = "32" ];

  // State root of the new state.
  bytes new_head_state = 6 [ (sila.eth.ext.ssz_size) = "32" ];

  // Epoch of the observed reorg.
  uint64 epoch = 7 [
    (sila.eth.ext.cast_type) =
        "github.com/sila-chain/Sila-Consensus-Core/v7/consensus-types/primitives.Epoch"
  ];

  // Information about optimistic sync.
  bool sila_optimistic = 8;
}

message EventFinalizedCheckpoint {
  // Block root of the finalized checkpoint.
  bytes block = 1 [ (sila.eth.ext.ssz_size) = "32" ];

  // State root of the finalized checkpoint.
  bytes state = 2 [ (sila.eth.ext.ssz_size) = "32" ];

  // Epoch the checkpoint references.
  uint64 epoch = 3 [
    (sila.eth.ext.cast_type) =
        "github.com/sila-chain/Sila-Consensus-Core/v7/consensus-types/primitives.Epoch"
  ];

  // Information about optimistic sync.
  bool sila_optimistic = 4;
}